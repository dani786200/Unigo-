<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGO — Login</title>
    <meta name="description" content="UniGO Smart University Transport Platform - Login to access your dashboard">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="public/css/custom.css">
</head>

<body>
    <div class="login-bg">
        <!-- Floating orbs -->
        <div
            style="position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,0.08),transparent);top:20%;left:10%;border-radius:50%;animation:pulse-glow 4s infinite;">
        </div>
        <div
            style="position:absolute;width:150px;height:150px;background:radial-gradient(circle,rgba(6,182,212,0.06),transparent);bottom:30%;right:15%;border-radius:50%;animation:pulse-glow 5s infinite 1s;">
        </div>

        <div class="login-card">
            <!-- Logo -->
            <div style="text-align:center;margin-bottom:32px;">
                <div
                    style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                    <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" />
                        <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10M17 16V8h3l2 4v4" />
                    </svg>
                </div>
                <h1
                    style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:700;color:var(--text-primary);">
                    Uni<span style="color:#818CF8;">GO</span>
                </h1>
                <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Smart University Transport Platform
                </p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="hidden" id="selectedRole" value="admin">

                <!-- Error Message Container -->
                <div id="errorMessage"
                    style="display:none; color: #F87171; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; text-align: center;">
                    Invalid email or password. Try again!
                </div>

                <div style="margin-bottom:16px;">
                    <label class="form-label">Email Address</label>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);"
                            width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input type="email" id="email" class="form-input" placeholder="admin@must.edu.pk" required
                            style="padding-left:40px;">
                    </div>
                </div>

                <div style="margin-bottom:16px;">
                    <label class="form-label">Password</label>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);"
                            width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0110 0v4" />
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required
                            minlength="6" style="padding-left:40px;padding-right:40px;">
                        <button type="button" onclick="togglePassword()"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;">
                            <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                    <label
                        style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-secondary);cursor:pointer;">
                        <input type="checkbox" style="accent-color:#6366F1;width:16px;height:16px;">
                        Remember me
                    </label>
                    <a href="#" style="font-size:0.8rem;color:#818CF8;text-decoration:none;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:12px;font-size:0.95rem;" id="loginBtn">
                    <span id="loginText">Sign In</span>
                    <svg id="loginSpinner" style="display:none;animation:spin 1s linear infinite;" width="18"
                        height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path
                            d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M6.34 6.34L3.51 3.51" />
                    </svg>
                </button>
            </form>

            <div style="text-align:center;margin-top:24px;">
                <p style="color:var(--text-muted);font-size:0.85rem;">
                    Don't have an account?
                    <a href="register.html" style="color:#818CF8;text-decoration:none;font-weight:600;">Register
                        here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.style.display = 'none';

            // Random validation (just checking if it contains @must.edu.pk and password is at least 6 chars)
            if (!email.endsWith('@must.edu.pk') || password.length < 6) {
                errorMsg.style.display = 'block';
                return;
            }

            text.textContent = 'Signing in...';
            spinner.style.display = 'block';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'views/admin/dashboard.html';
            }, 1200);
        }
    </script>

    <script>
        function initTheme() {
            const isLight = localStorage.getItem('theme') === 'light';
            if (isLight) document.body.classList.add('light-mode');
            updateThemeIcon();
        }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        }
        function updateThemeIcon() {
            const btn = document.getElementById('themeToggleBtn');
            if (!btn) return;
            const isLight = document.body.classList.contains('light-mode');
            btn.innerHTML = isLight
                ? '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>'
                : '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
        }
        document.addEventListener('DOMContentLoaded', initTheme);
    </script>

</body>

</html>
