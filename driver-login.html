<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGO — Driver Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="public/css/custom.css">
</head>
<body>
    <div class="login-bg" style="background: var(--bg-main);">
        <!-- Floating orbs -->
        <div style="position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(16, 185, 129,0.08),transparent);top:20%;left:10%;border-radius:50%;animation:pulse-glow 4s infinite;"></div>
        <div style="position:absolute;width:150px;height:150px;background:radial-gradient(circle,rgba(52, 211, 153,0.06),transparent);bottom:30%;right:15%;border-radius:50%;animation:pulse-glow 5s infinite 1s;"></div>

        <div class="login-card" style="border-top: 4px solid #10B981;">
            <!-- Logo -->
            <div style="text-align:center;margin-bottom:32px;">
                <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#059669,#10B981);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                    <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0v6"/>
                    </svg>
                </div>
                <h1 style="font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:700;color:var(--text-primary);">
                    Driver Portal
                </h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px;">Secure Fleet Access</p>
            </div>

            <!-- Login Form -->
            <form id="driverLoginForm" onsubmit="handleDriverLogin(event)">
                
                <!-- Error Message Container -->
                <div id="errorMessage" style="display:none; color: #F87171; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; text-align: center;">
                    Invalid Driver ID or Password.
                </div>

                <div style="margin-bottom:16px;">
                    <label class="form-label">Driver ID / License No.</label>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3h8l.778 7H3.222L6 10z"/>
                        </svg>
                        <input type="text" id="driverId" class="form-input" placeholder="e.g. HTV-1234" required style="padding-left:40px;">
                    </div>
                </div>

                <div style="margin-bottom:24px;">
                    <label class="form-label">Password / PIN</label>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <input type="password" id="driverPassword" class="form-input" placeholder="••••••••" required style="padding-left:40px;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:0.95rem;background:#10B981;" id="loginBtn">
                    <span id="loginText">Access Portal</span>
                    <svg id="loginSpinner" style="display:none;animation:spin 1s linear infinite;" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M6.34 6.34L3.51 3.51"/>
                    </svg>
                </button>
            </form>

            <div style="text-align:center;margin-top:24px;">
                <p style="color:var(--text-muted);font-size:0.85rem;">
                    Admin Access? <a href="index.html" style="color:#10B981;text-decoration:none;font-weight:600;">Go to Admin</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function handleDriverLogin(e) {
            e.preventDefault();
            const did = document.getElementById('driverId').value;
            const pwd = document.getElementById('driverPassword').value;
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.style.display = 'none';

            // Check localStorage
            let driversList = JSON.parse(localStorage.getItem('uniGoDrivers')) || [
                { id: 'HTV-001', name: 'Saran Zafar', bus: 'None' },
                { id: 'HTV-002', name: 'Imran Khan', bus: 'MUST-01' }
            ];

            const foundDriver = driversList.find(d => d.id === did);
            
            // Password is just length 4 for prototype demo
            if(!foundDriver || pwd.length < 4) {
                errorMsg.style.display = 'block';
                return;
            }

            // Save session
            localStorage.setItem('uniGoCurrentDriver', JSON.stringify(foundDriver));

            text.style.display = 'none';
            spinner.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'views/driver/dashboard.html';
            }, 800);
        }
    </script>
</body>
</html>
